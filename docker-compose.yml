version: '3.8'

x-common-env: &common-env
  DJANGO_ENV: production
  SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-mystudy.com,www.mystudy.com,localhost}
  DB_NAME: ${DB_NAME:-driving_study}
  DB_USER: ${DB_USER:-driving_user}
  DB_PASSWORD: ${DB_PASSWORD:-driving_password}
  DB_HOST: db
  DB_PORT: '5432'
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://mystudy.com}
  EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
  EMAIL_HOST: ${EMAIL_HOST:-smtp.yandex.ru}
  EMAIL_PORT: '465'
  EMAIL_USE_SSL: 'true'
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
  AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-eu-central-1}
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  SENTRY_DSN: ${SENTRY_DSN:-}

services:
  # ---- Database ----
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-driving_study}
      POSTGRES_USER: ${DB_USER:-driving_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-driving_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-driving_user} -d ${DB_NAME:-driving_study}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-network

  # ---- Redis (cache + celery broker) ----
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  # ---- Django Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      <<: *common-env
    volumes:
      - backend_static:/app/static
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - app-network

  # ---- Celery Worker ----
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: []
    command: celery -A config worker -l info --concurrency=4
    environment:
      <<: *common-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

  # ---- Celery Beat (scheduler for periodic tasks) ----
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: []
    command: >
      celery -A config beat -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      <<: *common-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

  # ---- React Frontend (served by Nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  # ---- Main Nginx (reverse proxy) ----
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/var/www/backend-static:ro
      - backend_media:/var/www/backend-media:ro
      - ./ssl:/etc/letsencrypt:ro
      - certbot_data:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - app-network

  # ---- Certbot (auto SSL certificates) ----
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_data:/var/www/certbot
      - ./ssl:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx
    profiles:
      - certbot

volumes:
  postgres_data:
  redis_data:
  backend_static:
  backend_media:
  certbot_data:

networks:
  app-network:
    driver: bridge
